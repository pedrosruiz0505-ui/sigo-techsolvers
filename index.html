<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGO - Sistema Interno de Gestão Operacional</title>
    <!-- Tailwind CSS para um design moderno e profissional -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <!-- Navbar -->
    <nav class="bg-indigo-700 text-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fa-solid fa-wallet mr-2"></i>SIGO | TechSolvers</h1>
            <span class="text-sm bg-indigo-800 px-3 py-1 rounded-full text-indigo-200">Painel do Parceiro</span>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <main class="container mx-auto p-4 md:p-6 max-w-6xl">
        
        <!-- Dashboard de Valores -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <!-- Saldo -->
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-indigo-500">
                <p class="text-gray-500 text-sm font-semibold uppercase">Saldo Geral</p>
                <p id="saldo-total" class="text-2xl font-bold text-gray-800">R$ 0,00</p>
            </div>
            <!-- Entradas -->
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-emerald-500">
                <p class="text-gray-500 text-sm font-semibold uppercase">Total Entradas</p>
                <p id="total-entradas" class="text-2xl font-bold text-emerald-600">R$ 0,00</p>
            </div>
            <!-- Saídas -->
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-rose-500">
                <p class="text-gray-500 text-sm font-semibold uppercase">Total Saídas</p>
                <p id="total-saidas" class="text-2xl font-bold text-rose-600">R$ 0,00</p>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Formulário de Cadastro -->
            <section class="bg-white p-6 rounded-xl shadow-sm lg:col-span-1">
                <h3 class="text-lg font-bold text-gray-700 mb-4"><i class="fa-solid fa-circle-plus mr-2 text-indigo-600"></i>Nova Transação</h3>
                <form id="form-transacao" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Descrição</label>
                        <input type="text" id="descricao" required class="w-full mt-1 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Ex: Contrato Projeto Alfa">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Valor (R$)</label>
                        <input type="number" step="0.01" id="valor" required class="w-full mt-1 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="0,00">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Tipo de Operação</label>
                        <select id="tipo" class="w-full mt-1 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="entrada">Entrada (Receita)</option>
                            <option value="saida">Saída (Despesa)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Centro de Custo / Categoria</label>
                        <select id="categoria" class="w-full mt-1 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="Desenvolvimento">Desenvolvimento de Software</option>
                            <option value="Infraestrutura">Infraestrutura / Cloud</option>
                            <option value="Marketing">Marketing / Comercial</option>
                            <option value="Suprimentos">Suprimentos / Administrativo</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                        Adicionar Transação
                    </button>
                </form>
            </section>

            <!-- Histórico e Relatórios -->
            <section class="bg-white p-6 rounded-xl shadow-sm lg:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-gray-700"><i class="fa-solid fa-list-check mr-2 text-indigo-600"></i>Extrato de Transações</h3>
                    <button onclick="limparHistorico()" class="text-sm text-gray-400 hover:text-rose-600 transition"><i class="fa-solid fa-trash-can mr-1"></i>Limpar Tudo</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-gray-200 bg-gray-50 text-gray-600 text-sm uppercase font-semibold">
                                <th class="p-3">Descrição</th>
                                <th class="p-3">Categoria</th>
                                <th class="p-3 text-right">Valor</th>
                                <th class="p-3 text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-transacoes" class="text-gray-700 text-sm divide-y divide-gray-100">
                            <!-- Inserido dinamicamente via JS -->
                        </tbody>
                    </table>
                    <div id="mensagem-vazia" class="text-center py-8 text-gray-400 hidden">
                        <i class="fa-regular fa-folder-open text-3xl mb-2 block"></i>
                        Nenhuma movimentação registrada.
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Regras do Sistema (JavaScript) -->
    <script>
        let transacoes = JSON.parse(localStorage.getItem('transacoes')) || [];

        const form = document.getElementById('form-transacao');
        const tabela = document.getElementById('tabela-transacoes');
        const msgVazia = document.getElementById('mensagem-vazia');

        function atualizarDashboard() {
            let entradas = 0;
            let saidas = 0;

            transacoes.forEach(t => {
                if (t.tipo === 'entrada') entradas += t.valor;
                else saidas += t.valor;
            });

            const saldo = entradas - saidas;

            document.getElementById('saldo-total').innerText = saldo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('total-entradas').innerText = entradas.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('total-saidas').innerText = saidas.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            
            // Alterar cor do saldo se for negativo
            const saldoTxt = document.getElementById('saldo-total');
            if (saldo < 0) { saldoTxt.className = "text-2xl font-bold text-rose-600"; }
            else if (saldo > 0) { saldoTxt.className = "text-2xl font-bold text-emerald-600"; }
            else { saldoTxt.className = "text-2xl font-bold text-gray-800"; }
        }

        function renderizarTabela() {
            tabela.innerHTML = '';
            
            if (transacoes.length === 0) {
                msgVazia.classList.remove('hidden');
                return;
            } else {
                msgVazia.classList.add('hidden');
            }

            transacoes.forEach((t, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition";
                
                const valorFormatado = t.valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                const corValor = t.tipo === 'entrada' ? 'text-emerald-600 font-semibold' : 'text-rose-600 font-semibold';
                const sinal = t.tipo === 'entrada' ? '+' : '-';

                tr.innerHTML = `
                    <td class="p-3 font-medium">${t.descricao}</td>
                    <td class="p-3"><span class="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded-md font-mono">${t.categoria}</span></td>
                    <td class="p-3 text-right ${corValor}">${sinal} ${valorFormatado}</td>
                    <td class="p-3 text-center">
                        <button onclick="deletarTransacao(${index})" class="text-gray-400 hover:text-rose-600 transition p-1">
                            <i class="fa-solid fa-xmark text-lg"></i>
                        </button>
                    </td>
                `;
                tabela.appendChild(tr);
            });
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const novaTransacao = {
                descricao: document.getElementById('descricao').value,
                valor: parseFloat(document.getElementById('valor').value),
                tipo: document.getElementById('tipo').value,
                categoria: document.getElementById('categoria').value
            };

            transacoes.push(novaTransacao);
            salvarDados();
            form.reset();
        });

        function deletarTransacao(index) {
            transacoes.splice(index, 1);
            salvarDados();
        }

        function limparHistorico() {
            if(confirm("Deseja limpar todos os registros do sistema?")) {
                transacoes = [];
                salvarDados();
            }
        }

        function salvarDados() {
            localStorage.setItem('transacoes', JSON.stringify(transacoes));
            atualizarDashboard();
            renderizarTabela();
        }

        // Inicialização
        atualizarDashboard();
        renderizarTabela();
    </script>
</body>
</html>
